<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js WebGPU Instancing + TSL</title>
  <link rel="stylesheet" href="./styles.css">
  <script type="importmap">
    {
      "imports": {
        "three/webgpu":  "https://esm.sh/three@0.172.0/webgpu",
        "three/tsl":     "https://esm.sh/three@0.172.0/tsl",
        "three/addons/": "https://esm.sh/three@0.172.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <h1>WebGPU Instancing</h1>
    <p>1000 objects, 2 box shapes, 3 orientation matrices (TSL shader)</p>
    <div id="controls">
      <div class="control-row">
        <label for="group-select">Symmetry Group</label>
        <select id="group-select"></select>
      </div>
      <div class="control-row">
        <label for="style-select">Style</label>
        <select id="style-select"></select>
      </div>
    </div>
    <button id="regenerate">Regenerate instances</button>
  </div>
  <div id="message"></div>
  <script type="module" src="./js/main.js"></script>
</body>
</html>
